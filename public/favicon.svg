<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#001a1f"/>
      <stop offset="100%" stop-color="#000a0d"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)" rx="10"/>

  <!-- Battery body -->
  <rect x="4" y="16" width="52" height="32" rx="5" stroke="#00e5ff" stroke-width="2.2" fill="none" filter="url(#glow)"/>

  <!-- Battery terminal (positive) -->
  <rect x="56" y="24" width="5" height="16" rx="2" fill="#00e5ff" filter="url(#glow)"/>

  <!-- Sound wave path inside battery -->
  <!-- Wave goes from left to right, peaks in the middle -->
  <path
    d="M8 32
       L11 32
       L12.5 26
       L14 32
       L15.5 32
       L17 22
       L18.5 32
       L20 32
       L21.5 18
       L23 42
       L24.5 14
       L26 46
       L27.5 20
       L29 38
       L30.5 16
       L32 44
       L33.5 18
       L35 40
       L36.5 22
       L38 32
       L39.5 28
       L41 36
       L42.5 30
       L44 32
       L45.5 30
       L47 34
       L48.5 32
       L52 32"
    stroke="#00e5ff"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow-strong)"
  />
</svg>

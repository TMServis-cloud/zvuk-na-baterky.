<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0a0015"/>
    </radialGradient>
    <linearGradient id="cone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#7000ff"/>
      <stop offset="100%" stop-color="#ff00f5"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7000ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff00f5" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#7000ff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Speaker cabinet (rounded rect) -->
  <rect x="16" y="14" width="32" height="36" rx="6" fill="#0d0020" stroke="#7000ff" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="13" stroke="url(#ring2)" stroke-width="1.5" fill="none"/>

  <!-- Middle ring -->
  <circle cx="32" cy="32" r="9" stroke="url(#ring1)" stroke-width="1.5" fill="none"/>

  <!-- Speaker cone -->
  <circle cx="32" cy="32" r="6" fill="url(#cone)" filter="url(#glow)"/>

  <!-- Dust cap (center highlight) -->
  <circle cx="32" cy="32" r="2.5" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Tweeter dot top -->
  <circle cx="32" cy="19" r="2" fill="#00f0ff" fill-opacity="0.9" filter="url(#glow)"/>

  <!-- Bass reflex port bottom -->
  <rect x="24" y="44" width="16" height="3" rx="1.5" fill="#7000ff" fill-opacity="0.7"/>
</svg>

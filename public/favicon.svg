<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#001a1f"/>
      <stop offset="100%" stop-color="#000a0d"/>
    </radialGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00f5"/>
      <stop offset="50%" stop-color="#7000ff"/>
      <stop offset="100%" stop-color="#ff00f5"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-wave" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)" rx="10"/>

  <!-- Battery body -->
  <rect x="4" y="16" width="52" height="32" rx="5" stroke="#00e5ff" stroke-width="2.2" fill="none" filter="url(#glow)"/>

  <!-- Battery terminal (positive) -->
  <rect x="56" y="24" width="5" height="16" rx="2" fill="#00e5ff" filter="url(#glow)"/>

  <!-- Sound wave — smaller amplitude, pink→purple gradient -->
  <path
    d="M8 32
       L11 32
       L12.5 29
       L14 32
       L15.5 32
       L17 27
       L18.5 32
       L20 32
       L21.5 25
       L23 37
       L24.5 22
       L26 40
       L27.5 24
       L29 36
       L30.5 21
       L32 39
       L33.5 23
       L35 37
       L36.5 26
       L38 32
       L39.5 29
       L41 35
       L42.5 31
       L44 32
       L45.5 30
       L47 34
       L48.5 32
       L52 32"
    stroke="url(#wave-grad)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow-wave)"
  />
</svg>
